<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Cricket Scoreboard - Professional</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --bar-height: 75px; 
            --primary-text: #ffffff;
            --secondary-text: #a0aec0;
            --accent-color: #ffde00; 
            --bg-color: rgba(15, 23, 42, 0.9); 
            --four-color: #00aaff;
            --six-color: #ff00cc;
            --wicket-color: #ff4444;
            --noball-color: #ffaa00;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
        }

        .broadcast-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #youtubePlayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1; 
            transition: opacity 0.5s ease;
        }

        /* SOUND INTERACTION OVERLAY */
        .interaction-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999999; 
            font-size: 26px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        .interaction-overlay:hover { background: rgba(0,0,0,0.95); color: var(--accent-color); }

        /* TIMERS OVERLAY (INNINGS & OVERS) */
        .break-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }
        .break-overlay h1 {
            font-size: 6vw;
            color: var(--accent-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 222, 0, 0.5);
        }
        .break-overlay .timer-box {
            font-size: 3vw;
            color: #fff;
            font-weight: 600;
        }
        .break-overlay .timer-box span { color: var(--wicket-color); font-size: 4vw; }

        /* PROFESSIONAL SCOREBOARD STYLE */
        .scoreboard-bar {
            box-sizing: border-box;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            height: var(--bar-height);
            background: var(--bg-color);
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            color: var(--primary-text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50; 
            transition: transform 0.3s ease;
        }

        /* FULLSCREEN ANIMATION OVERLAY */
        .animation-overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 99999; 
            pointer-events: none; 
            opacity: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 70%); 
            transition: opacity 0.2s ease;
        }
        .animation-overlay.active { opacity: 1; }

        #animationText {
            display: inline-block; 
            color: white;
            font-size: 14vw; 
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            opacity: 0;
            margin-bottom: 50px; 
        }

        @keyframes pop-in-out {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            15% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            80% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(10deg); opacity: 0; filter: blur(10px); }
        }

        @keyframes pop-noball {
            0% { transform: scale(0); opacity: 0; }
            15% { transform: scale(1.2); opacity: 1; }
            25% { transform: scale(1); opacity: 1; text-shadow: 0 0 80px var(--noball-color); }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px var(--noball-color); }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; filter: blur(10px); }
        }

        .animation-overlay.animate-four #animationText {
            text-shadow: 0 0 30px var(--four-color), 0 0 60px var(--four-color), 0 0 100px #fff;
            animation: pop-in-out 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animation-overlay.animate-six #animationText {
            text-shadow: 0 0 30px var(--six-color), 0 0 60px var(--six-color), 0 0 100px #fff;
            animation: pop-in-out 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animation-overlay.animate-wicket #animationText {
            text-shadow: 0 0 30px var(--wicket-color), 0 0 60px var(--wicket-color), 0 0 100px #fff;
            animation: pop-in-out 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animation-overlay.animate-noball #animationText {
            color: var(--noball-color);
            text-shadow: 0 0 30px var(--noball-color), 0 0 60px var(--noball-color), 0 0 100px #fff;
            animation: pop-noball 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Layout Sizes */
        .team-section, .player-section, .bowler-section { display: flex; align-items: center; gap: 15px; height: 100%; }
        .team-logo { height: 45px; width: 45px; object-fit: contain; }
        .team-names { font-size: 16px; line-height: 1.2; font-weight: 600; white-space: nowrap; }
        .score-details { display: flex; align-items: center; gap: 12px; }
        .score-box { background-color: rgba(0,0,0,0.6); padding: 4px 14px; font-size: 28px; font-weight: 700; border-radius: 6px; color: var(--accent-color); letter-spacing: 1px; }
        .overs-box { font-size: 13px; color: var(--secondary-text); font-weight: 500; }
        .separator { width: 1px; height: 60%; background-color: rgba(255, 255, 255, 0.2); }
        .batsmen { display: flex; flex-direction: column; justify-content: center; gap: 2px; font-size: 15px; }
        .batsman { display: flex; align-items: center; gap: 8px; }
        .batsman .name { width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;}
        .batsman .runs { font-weight: 700; width: 30px; text-align: right; font-size: 16px;}
        .batsman .balls { color: var(--secondary-text); width: 35px; font-size: 13px;}
        .batsman.striker .name { color: var(--accent-color); font-weight: 600;}
        
        .bowler-wrapper { display: flex; flex-direction: column; justify-content: center; gap: 3px; }
        .bowler-info { display: flex; align-items: center;}
        .bowler-info .name { font-size: 15px; font-weight: 500; margin-right: 15px; width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .prev-over { font-size: 10px; color: var(--secondary-text); letter-spacing: 0.5px; margin-bottom: 2px; font-weight: 600;}
        
        .ball-tracker { display: flex; align-items: center; gap: 6px; }
        .ball { width: 26px; height: 26px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.1); border: 1px solid rgba(255, 255, 255, 0.3); }
        .ball-run { background: #ffffff; color: #000; border: none; }
        .ball-four { background: var(--four-color); color: #fff; border: none; }
        .ball-six { background: var(--six-color); color: #fff; border: none; }
        .ball-wicket { background: var(--wicket-color); color: #fff; border: none; }
        .ball-extra { background: var(--noball-color); color: #000; border: none; }

        @media (max-width: 900px) {
            .scoreboard-bar { transform: translateX(-50%) scale(0.85); transform-origin: bottom center; bottom: 10px; width: 100%;}
        }
        @media (max-width: 600px) {
            .scoreboard-bar { transform: translateX(-50%) scale(0.65); transform-origin: bottom center; bottom: 5px; width: 100vw; padding: 0 10px; }
        }
    </style>
</head>
<body>

<audio id="sirenSound" src="siren.mp3" preload="auto"></audio>

<div id="interactionOverlay" class="interaction-overlay">
    <span>🖱️ Click here to start Video & Sound</span>
</div>

<div id="breakOverlay" class="break-overlay">
    <h1 id="breakTitle">OVER COMPLETE</h1>
    <div class="timer-box">Resuming in <span id="breakTimer">30</span>s</div>
</div>

<div class="broadcast-container">
    <iframe id="youtubePlayer" allow="autoplay; fullscreen; encrypted-media" frameborder="0"></iframe>

    <div class="animation-overlay" id="animationOverlay">
        <span id="animationText"></span>
    </div>

    <div class="scoreboard-bar" id="scoreboardBar">
        <div class="team-section">
            <img id="teamALogo" src="https://via.placeholder.com/50x50/ffffff/000000?text=A" alt="Team A" class="team-logo">
            <div class="team-names">
                <span id="teamAName">TEAM A</span><br>
                <span id="teamBName" style="color: var(--secondary-text); font-size: 0.85em;">v TEAM B</span>
            </div>
            <div class="score-details">
                <div class="score-box">
                    <span id="runs">0</span>-<span id="wickets">0</span>
                </div>
                <div class="overs-box">
                    OVERS <span id="overs" style="color:#fff; font-weight:700;">0.0</span>
                </div>
            </div>
        </div>
        
        <div class="separator"></div>
        
        <div class="player-section">
            <div class="batsmen">
                <div class="batsman striker">
                    <span class="name" id="strikerName">Striker*</span>
                    <span class="runs" id="strikerRuns">0</span>
                    <span class="balls">(<span id="strikerBalls">0</span>)</span>
                </div>
                <div class="batsman" id="nonStrikerContainer">
                    <span class="name" id="nonStrikerName">Non-Striker</span>
                    <span class="runs" id="nonStrikerRuns">0</span>
                    <span class="balls">(<span id="nonStrikerBalls">0</span>)</span>
                </div>
            </div>
        </div>
        
        <div class="separator"></div>
        
        <div class="bowler-section">
            <div class="bowler-wrapper">
                <div class="prev-over" id="prevOverSummary" style="display:none;">Prev: </div>
                <div class="bowler-info">
                    <span class="name" id="bowlerName">Bowler</span>
                </div>
            </div>
            <div class="ball-tracker" id="ballTracker"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCUsKRK-HQHQdtNHz2uudAvEMCibG-Ehdc",
      authDomain: "appforge-studio-n70sk.firebaseapp.com",
      databaseURL: "https://appforge-studio-n70sk-default-rtdb.firebaseio.com",
      projectId: "appforge-studio-n70sk",
      storageBucket: "appforge-studio-n70sk.firebasestorage.app",
      messagingSenderId: "374753394892",
      appId: "1:374753394892:web:0d32fc8ba5988e1aa18269"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dbRef = db.ref('match');

    let processedEventId = null;
    let isUserInteracted = false;
    let animationTimeout = null;
    let breakInterval = null;

    const interactionOverlay = document.getElementById('interactionOverlay');
    interactionOverlay.addEventListener('click', () => {
        isUserInteracted = true;
        interactionOverlay.style.opacity = '0';
        setTimeout(() => { interactionOverlay.style.display = 'none'; }, 500);

        const ytPlayer = document.getElementById('youtubePlayer');
        if (ytPlayer.src && ytPlayer.src.includes('mute=1')) {
            ytPlayer.src = ytPlayer.src.replace('mute=1', 'mute=0');
        }
    });

    const safeSetText = (id, text) => {
        const el = document.getElementById(id);
        if (el && el.textContent !== String(text)) el.textContent = String(text);
    };

    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        safeSetText('teamAName', data.teams?.teamA?.name || 'TEAM A');
        document.getElementById('teamALogo').src = data.teams?.teamA?.logo || 'https://via.placeholder.com/50x50/ffffff/000000?text=A';
        safeSetText('teamBName', `v ${data.teams?.teamB?.name || 'TEAM B'}`);
        
        safeSetText('runs', data.score?.runs || 0);
        safeSetText('wickets', data.score?.wickets || 0);
        safeSetText('overs', `${data.score?.overs || 0}.${data.score?.balls || 0}`);
        
        safeSetText('strikerName', (data.players?.striker?.name || 'Striker') + '*');
        safeSetText('strikerRuns', data.players?.striker?.runs || 0);
        safeSetText('strikerBalls', data.players?.striker?.balls || 0);
        
        const nsEl = document.getElementById('nonStrikerContainer');
        if (!data.players?.nonStriker?.name || data.players.nonStriker.name.trim() === '') {
            nsEl.style.display = 'none';
        } else {
            nsEl.style.display = 'flex';
            safeSetText('nonStrikerName', data.players.nonStriker.name);
            safeSetText('nonStrikerRuns', data.players.nonStriker.runs || 0);
            safeSetText('nonStrikerBalls', data.players.nonStriker.balls || 0);
        }
        
        safeSetText('bowlerName', data.players?.bowler?.name || 'Bowler');

        // YOUTUBE VIDEO UPDATE
        if (data.youtubeURL) {
            const ytPlayer = document.getElementById('youtubePlayer');
            let finalURL = data.youtubeURL;
            if (isUserInteracted) finalURL = finalURL.replace('mute=1', 'mute=0');
            if (ytPlayer.src !== finalURL) ytPlayer.src = finalURL;
        }

        // PREVIOUS OVER SUMMARY
        const prevSummary = document.getElementById('prevOverSummary');
        if (data.previousOverHistory && data.previousOverHistory.length > 0) {
            prevSummary.textContent = 'PREV OVER: ' + data.previousOverHistory.join(' ');
            prevSummary.style.display = 'block';
        } else {
            prevSummary.style.display = 'none';
        }
        
        // BALL TRACKER
        const ballTracker = document.getElementById('ballTracker');
        ballTracker.innerHTML = '';
        if(data.lastBalls && Array.isArray(data.lastBalls)) {
            const currentOverBalls = data.lastBalls.slice(-6);
            currentOverBalls.forEach(ball => {
                const ballEl = document.createElement('div');
                ballEl.textContent = ball;
                ballEl.classList.add('ball');

                if (ball === '4') ballEl.classList.add('ball-four');
                else if (ball === '6') ballEl.classList.add('ball-six');
                else if (ball === 'W') ballEl.classList.add('ball-wicket');
                else if (isNaN(ball)) ballEl.classList.add('ball-extra');
                else ballEl.classList.add('ball-run');

                ballTracker.appendChild(ballEl);
            });
        }

        // BREAK / TIMERS LOGIC
        const overlay = document.getElementById('breakOverlay');
        const title = document.getElementById('breakTitle');
        const timer = document.getElementById('breakTimer');
        const yt = document.getElementById('youtubePlayer');
        const status = data.matchStatus || 'LIVE';

        if (status === 'LIVE' || !data.breakEndTime) {
            overlay.style.display = 'none';
            yt.style.opacity = '1';
            clearInterval(breakInterval);
        } else {
            overlay.style.display = 'flex';
            yt.style.opacity = '0';
            title.textContent = status === 'INNINGS_BREAK' ? 'INNINGS END' : 'OVER COMPLETE';
            
            clearInterval(breakInterval);
            breakInterval = setInterval(() => {
                let remaining = Math.max(0, Math.floor((data.breakEndTime - Date.now()) / 1000));
                timer.textContent = remaining;
                if (remaining <= 0) clearInterval(breakInterval);
            }, 200);
        }

        // ANIMATIONS
        if (data.lastEvent && data.lastEvent !== processedEventId) {
            let isFirstLoad = (processedEventId === null);
            processedEventId = data.lastEvent;

            if (!isFirstLoad) {
                const eventType = data.lastEvent.split('_')[0]; 
                const animOverlay = document.getElementById('animationOverlay');
                const overlayText = document.getElementById('animationText');
                
                let applyClass = '';
                let showText = '';

                if (eventType === 'FOUR') { applyClass = 'animate-four'; showText = 'FOUR!'; }
                else if (eventType === 'SIX') { applyClass = 'animate-six'; showText = 'SIX!'; }
                else if (eventType === 'WICKET') { applyClass = 'animate-wicket'; showText = 'WICKET!'; }
                else if (eventType === 'NOBALL') { 
                    applyClass = 'animate-noball'; showText = 'NO BALL!'; 
                    const siren = document.getElementById('sirenSound');
                    if(siren && isUserInteracted) siren.play().catch(e => console.log('Audio error:', e));
                }

                if (applyClass) {
                    overlayText.textContent = showText;
                    if(animationTimeout) clearTimeout(animationTimeout);
                    
                    animOverlay.className = 'animation-overlay'; // Reset
                    
                    setTimeout(() => {
                        animOverlay.classList.add('active', applyClass);
                        animationTimeout = setTimeout(() => {
                            animOverlay.className = 'animation-overlay';
                        }, 3000);
                    }, 50); // Slight delay to ensure CSS re-trigger
                }
            }
        }
    });
</script>
</body>
</html>
