<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Cricket Scoreboard - Professional</title>
    <style>
        /* Using Poppins for a clean, modern, professional look */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --bar-height: 85px; 
            --primary-text: #ffffff;
            --secondary-text: #a0aec0;
            --accent-color: #ffde00; 
            --bg-color: rgba(15, 23, 42, 0.9); 
            --four-color: #00aaff;
            --six-color: #ff00cc;
            --wicket-color: #ff4444;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
        }

        .broadcast-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #youtubePlayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1; /* Player background mein rahega */
        }

        /* --- PROFESSIONAL SCOREBOARD STYLE --- */
        .scoreboard-bar {
            box-sizing: border-box;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            height: var(--bar-height);
            background: var(--bg-color);
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            color: var(--primary-text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 50; /* Scoreboard video ke upar */
        }

        /* ==========================================
           FIXED: FULLSCREEN ANIMATION OVERLAY 
           ========================================== */
        .animation-overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 99999; /* HIGHEST Z-INDEX - Sabse aage rahega */
            pointer-events: none; 
            opacity: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 70%); /* Cinematic dark focus background */
            transition: opacity 0.2s ease;
        }

        .animation-overlay.active {
            opacity: 1;
        }

        /* SPAN ka DISPLAY INLINE-BLOCK hona zaruri hai Transform ke liye */
        #animationText {
            display: inline-block; 
            color: white;
            font-size: 16vw; 
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            opacity: 0;
            margin-bottom: 50px; /* Thoda center se upar taaki scoreboard na chhupe */
        }

        /* 3D Cinematic Animation Keyframes */
        @keyframes pop-in-out {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            15% { transform: scale(1.1) rotate(0deg); opacity: 1; }
            80% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(10deg); opacity: 0; filter: blur(10px); }
        }

        .animation-overlay.animate-four #animationText {
            text-shadow: 0 0 30px var(--four-color), 0 0 60px var(--four-color), 0 0 100px #fff;
            animation: pop-in-out 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animation-overlay.animate-six #animationText {
            text-shadow: 0 0 30px var(--six-color), 0 0 60px var(--six-color), 0 0 100px #fff;
            animation: pop-in-out 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .animation-overlay.animate-wicket #animationText {
            text-shadow: 0 0 30px var(--wicket-color), 0 0 60px var(--wicket-color), 0 0 100px #fff;
            animation: pop-in-out 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Layout Sizes */
        .team-section, .player-section, .bowler-section { display: flex; align-items: center; gap: 20px; height: 100%; }
        .team-logo { height: 50px; width: 50px; object-fit: contain; }
        .team-names { font-size: 18px; line-height: 1.2; font-weight: 600; white-space: nowrap; }
        .score-details { display: flex; align-items: center; gap: 15px; }
        .score-box { background-color: rgba(0,0,0,0.6); padding: 4px 18px; font-size: 32px; font-weight: 700; border-radius: 6px; color: var(--accent-color); letter-spacing: 1px; }
        .overs-box { font-size: 15px; color: var(--secondary-text); font-weight: 500; }
        .separator { width: 1px; height: 60%; background-color: rgba(255, 255, 255, 0.2); }
        .batsmen { display: flex; flex-direction: column; justify-content: center; gap: 4px; font-size: 16px; }
        .batsman { display: flex; align-items: center; gap: 10px; }
        .batsman .name { width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;}
        .batsman .runs { font-weight: 700; width: 35px; text-align: right; font-size: 18px;}
        .batsman .balls { color: var(--secondary-text); width: 40px; font-size: 14px;}
        .batsman.striker .name { color: var(--accent-color); font-weight: 600;}
        .bowler-info .name { font-size: 17px; font-weight: 500; margin-right: 15px; width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .ball-tracker { display: flex; align-items: center; gap: 8px; }
        
        .ball { width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 600; background: rgba(255,255,255,0.1); border: 1px solid rgba(255, 255, 255, 0.3); }
        .ball-run { background: #ffffff; color: #000; border: none; }
        .ball-four { background: var(--four-color); color: #fff; border: none; }
        .ball-six { background: var(--six-color); color: #fff; border: none; }
        .ball-wicket { background: var(--wicket-color); color: #fff; border: none; }
        .ball-extra { background: #ffaa00; color: #000; border: none; }
    </style>
</head>
<body>

<div class="broadcast-container">
    <iframe id="youtubePlayer" allow="autoplay; encrypted-media" frameborder="0"></iframe>

    <!-- OVERLAY SABSE UPAR RAHEGA -->
    <div class="animation-overlay" id="animationOverlay">
        <span id="animationText"></span>
    </div>

    <div class="scoreboard-bar" id="scoreboardBar">
        <div class="team-section">
            <img id="teamALogo" src="https://via.placeholder.com/50x50/ffffff/000000?text=A" alt="Team A" class="team-logo">
            <div class="team-names">
                <span id="teamAName">TEAM A</span><br>
                <span id="teamBName" style="color: var(--secondary-text); font-size: 0.85em;">v TEAM B</span>
            </div>
            <div class="score-details">
                <div class="score-box">
                    <span id="runs">0</span>-<span id="wickets">0</span>
                </div>
                <div class="overs-box">
                    OVERS <span id="overs" style="color:#fff; font-weight:700;">0.0</span>
                </div>
            </div>
        </div>
        
        <div class="separator"></div>
        
        <div class="player-section">
            <div class="batsmen">
                <div class="batsman striker">
                    <span class="name" id="strikerName">Striker*</span>
                    <span class="runs" id="strikerRuns">0</span>
                    <span class="balls">(<span id="strikerBalls">0</span>)</span>
                </div>
                <div class="batsman">
                    <span class="name" id="nonStrikerName">Non-Striker</span>
                    <span class="runs" id="nonStrikerRuns">0</span>
                    <span class="balls">(<span id="nonStrikerBalls">0</span>)</span>
                </div>
            </div>
        </div>
        
        <div class="separator"></div>
        
        <div class="bowler-section">
            <div class="bowler-info">
                <span class="name" id="bowlerName">Bowler</span>
            </div>
            <div class="ball-tracker" id="ballTracker"></div>
        </div>
    </div>
</div>

<script>

    firebase.initializeApp(firebaseConfig);

    let processedEventId = null;

    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // Updating Text/Scoreboard (Same as before)
        document.getElementById('teamAName').textContent = data.teams?.teamA?.name || 'TEAM A';
        document.getElementById('teamALogo').src = data.teams?.teamA?.logo || 'https://via.placeholder.com/50x50/ffffff/000000?text=A';
        document.getElementById('teamBName').textContent = `v ${data.teams?.teamB?.name || 'TEAM B'}`;
        
        document.getElementById('runs').textContent = data.score?.runs || 0;
        document.getElementById('wickets').textContent = data.score?.wickets || 0;
        document.getElementById('overs').textContent = `${data.score?.overs || 0}.${data.score?.balls || 0}`;
        
        document.getElementById('strikerName').textContent = (data.players?.striker?.name || 'Striker') + '*';
        document.getElementById('strikerRuns').textContent = data.players?.striker?.runs || 0;
        document.getElementById('strikerBalls').textContent = data.players?.striker?.balls || 0;
        
        document.getElementById('nonStrikerName').textContent = data.players?.nonStriker?.name || 'Non-Striker';
        document.getElementById('nonStrikerRuns').textContent = data.players?.nonStriker?.runs || 0;
        document.getElementById('nonStrikerBalls').textContent = data.players?.nonStriker?.balls || 0;
        
        document.getElementById('bowlerName').textContent = data.players?.bowler?.name || 'Bowler';
        
        // Ball Tracker setup
        const ballTracker = document.getElementById('ballTracker');
        ballTracker.innerHTML = '';
        if(data.lastBalls && Array.isArray(data.lastBalls)) {
            const currentOverBalls = data.lastBalls.slice(-6);
            currentOverBalls.forEach(ball => {
                const ballEl = document.createElement('div');
                ballEl.textContent = ball;
                ballEl.classList.add('ball');

                if (ball === '4') ballEl.classList.add('ball-four');
                else if (ball === '6') ballEl.classList.add('ball-six');
                else if (ball === 'W') ballEl.classList.add('ball-wicket');
                else if (isNaN(ball)) ballEl.classList.add('ball-extra');
                else ballEl.classList.add('ball-run');

                ballTracker.appendChild(ballEl);
            });
        }

        // ==========================================
        // PERFECT FULLSCREEN ANIMATION TRIGGER LOGIC
        // ==========================================
        if (data.lastEvent && data.lastEvent !== processedEventId) {
            
            // Check ki page refresh pe achanak se purana animation trigger na ho
            let isFirstLoad = (processedEventId === null);
            processedEventId = data.lastEvent;

            if (!isFirstLoad) {
                const eventType = data.lastEvent.split('_')[0]; 
                
                const overlay = document.getElementById('animationOverlay');
                const overlayText = document.getElementById('animationText');
                
                let applyClass = '';
                let showText = '';

                if (eventType === 'FOUR') { applyClass = 'animate-four'; showText = 'FOUR!'; }
                else if (eventType === 'SIX') { applyClass = 'animate-six'; showText = 'SIX!'; }
                else if (eventType === 'WICKET') { applyClass = 'animate-wicket'; showText = 'WICKET!'; }

                if (applyClass) {
                    overlayText.textContent = showText;
                    
                    // Pehle purani classes hata kar animation clear karo
                    overlay.className = 'animation-overlay active';
                    overlayText.style.animation = 'none';
                    
                    // Trick to force browser to re-render (Animation restart karne ke liye)
                    void overlayText.offsetWidth; 
                    
                    // Ab nayi class do aur animation chalao
                    overlay.classList.add(applyClass);
                    overlayText.style.animation = '';

                    // 3 seconds baad overlay chupao
